services:
  # ==========================================
  # 1. KAFKA & DEBEZIUM (REPLICACIÓN DE DATOS)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  debezium:
    image: debezium/connect:2.4
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ==========================================
  # 2. APIs REST (BACKEND - RENDER LOCAL)
  # ==========================================
  api-rest-1:
    build: ./api-rest
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-rest-2:
    build: ./api-rest
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 3. BALANCEADOR DE CARGA (API REST)
  # ==========================================
  nginx-api-balancer:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/api_balancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-rest-1:
        condition: service_healthy
      api-rest-2:
        condition: service_healthy

  # ==========================================
  # 4. SERVICIO SOAP (FACTURACIÓN)
  # ==========================================
  soap-service:
    build: ./soap-service
    restart: always
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/wsdl?wsdl"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 5. PORTALES INFORMATIVOS (WORDPRESS)
  # ==========================================
  db-wp-1:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
    volumes:
      - wp1_data:/var/lib/mysql
      - ./db-dumps/wordpress-1.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress-1:
    image: wordpress:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: db-wp-1:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp1_files:/var/www/html
      - ./wordpress-1-mu:/var/www/html/wp-content/mu-plugins
    depends_on:
      db-wp-1:
        condition: service_healthy

  db-wp-2:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
    volumes:
      - wp2_data:/var/lib/mysql
      - ./db-dumps/wordpress-2.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress-2:
    image: wordpress:latest
    restart: always
    ports:
      - "8082:80"
    environment:
      WORDPRESS_DB_HOST: db-wp-2:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp2_files:/var/www/html
      - ./wordpress-2-mu:/var/www/html/wp-content/mu-plugins
    depends_on:
      db-wp-2:
        condition: service_healthy

  # ==========================================
  # 6. PORTALES INFORMATIVOS (JOOMLA)
  # ==========================================
  db-joomla-1:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: joomla
    volumes:
      - joomla1_data:/var/lib/mysql
      - ./db-dumps/joomla-1.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  joomla-1:
    image: joomla:latest
    restart: always
    ports:
      - "8085:80"
    environment:
      JOOMLA_DB_HOST: db-joomla-1:3306
      JOOMLA_DB_USER: root
      JOOMLA_DB_PASSWORD: root
      JOOMLA_DB_NAME: joomla
    volumes:
      - joomla1_files:/var/www/html
      - ./joomla-1-cassiopeia.php:/var/www/html/templates/cassiopeia/index.php
      - ./joomla-1-atum.php:/var/www/html/administrator/templates/atum/index.php
    depends_on:
      db-joomla-1:
        condition: service_healthy

  db-joomla-2:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: joomla
    volumes:
      - joomla2_data:/var/lib/mysql
      - ./db-dumps/joomla-2.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  joomla-2:
    image: joomla:latest
    restart: always
    ports:
      - "8084:80"
    environment:
      JOOMLA_DB_HOST: db-joomla-2:3306
      JOOMLA_DB_USER: root
      JOOMLA_DB_PASSWORD: root
      JOOMLA_DB_NAME: joomla
    volumes:
      - joomla2_files:/var/www/html
      - ./joomla-2-cassiopeia.php:/var/www/html/templates/cassiopeia/index.php
      - ./joomla-2-atum.php:/var/www/html/administrator/templates/atum/index.php
    depends_on:
      db-joomla-2:
        condition: service_healthy

  # ==========================================
  # 7. FAILOVER LOCAL (NGINX simulando Keepalived)
  # ==========================================
  nginx-failover:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/portal_failover.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wordpress-1
      - wordpress-2
      - joomla-1
      - joomla-2

  # ==========================================
  # 8. CLIENTE WEB (REACT + TAILWIND)
  # ==========================================
  web-client:
    build: ./web-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./web-client/src:/app/src
      - ./web-client/public:/app/public

  # ==========================================
  # 9. REPLICADOR CDC (SUPABASE -> MONGO & AIVEN)
  # ==========================================
  replicador:
    image: node:22-alpine
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules # Evita sobreescribir node_modules del host en el contenedor
    command: sh -c "npm install && node replicador.js"
    env_file:
      - .env

# ==========================================
# VOLÚMENES PERSISTENTES
# Todo el contenido se guarda en Docker volumes.
# Al reiniciar el sistema, nada se pierde.
# ==========================================
volumes:
  # Kafka y Zookeeper
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  # WordPress bases de datos y archivos del sitio
  wp1_data:
  wp1_files:
  wp2_data:
  wp2_files:
  # Joomla bases de datos y archivos del sitio
  joomla1_data:
  joomla1_files:
  joomla2_data:
  joomla2_files:
