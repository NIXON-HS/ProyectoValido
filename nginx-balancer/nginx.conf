events {
    worker_connections 1024;
}

http {

    # ─── Definición de los backends en Render ────────────────────────────────
    upstream api_backend {
        # Instancia principal
        server api-rest-render-1.onrender.com:443;

        # Instancia de respaldo (failover automático)
        server api-rest-render-2.onrender.com:443 backup;
    }

    # ─── Servidor proxy / balanceador ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Cabeceras de seguridad y CORS
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";

        # Manejar preflight CORS
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location / {
            # Proxy hacia el upstream de Render (HTTPS)
            proxy_pass          https://api_backend;
            
            # Importante: pasar el Host del backend real, no del proxy
            proxy_ssl_server_name on;
            proxy_set_header    Host api-rest-render-1.onrender.com;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Authorization $http_authorization;

            # Timeouts (Render free tier puede tardar en despertar)
            proxy_connect_timeout   60s;
            proxy_read_timeout      60s;
            proxy_send_timeout      60s;
        }

        # Health check para Render
        location /health {
            return 200 '{"status":"nginx-balancer ok"}';
            add_header Content-Type application/json;
        }
    }
}
