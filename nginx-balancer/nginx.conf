events {
    worker_connections 1024;
}

http {
    # ─── Resolver DNS (clave para resolver hostnames externos en tiempo real) ──
    resolver 8.8.8.8 8.8.4.4 valid=30s;
    resolver_timeout 10s;

    server {
        listen 80;
        server_name _;

        # ─── CORS en TODAS las respuestas (incluido errores 4xx y 5xx) ─────────
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;

        # Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ─── Health check ────────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"nginx-balancer ok","backends":["api-rest-render-1","api-rest-render-2"]}';
            add_header Content-Type application/json always;
        }

        # ─── Proxy hacia las APIs en Render ──────────────────────────────────────
        # Usamos variable para que NGINX resuelva el host con el resolver DNS
        # y no falle al arrancar si los backends no están disponibles.
        location / {
            # Instancia principal
            set $backend "https://api-rest-render-1.onrender.com";

            # Ocultar CORS del backend para evitar el error "multiple values '*, *'"
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            proxy_pass          $backend;
            proxy_ssl_server_name on;

            # Host del backend real (necesario para SNI en TLS)
            proxy_set_header    Host              api-rest-render-1.onrender.com;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Authorization     $http_authorization;
            proxy_set_header    Content-Type      $content_type;

            # Timeouts generosos (Render free tier puede tardar en despertar)
            proxy_connect_timeout  60s;
            proxy_read_timeout     120s;
            proxy_send_timeout     60s;

            # Reintentar en la instancia 2 si la 1 falla (failover manual)
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
